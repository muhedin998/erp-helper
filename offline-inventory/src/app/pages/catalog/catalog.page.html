<ion-header class="ion-no-border">
  <ion-toolbar class="page-header">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" icon="chevron-back"></ion-back-button>
    </ion-buttons>
    <ion-title>Katalog</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="addProduct()">
        <ion-icon slot="icon-only" name="add-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Search -->
  <div class="ion-padding-horizontal ion-padding-top">
    <ion-searchbar
      class="custom-searchbar"
      [(ngModel)]="searchText"
      (ionInput)="onSearch($any($event.detail).value)"
      placeholder="Pretraži po nazivu, šifri, barkodu"
      animated
      debounce="300"
    ></ion-searchbar>
  </div>

  <!-- Products list -->
  <ion-list>
    <div class="product-card" *ngFor="let product of store.filteredProducts()" (click)="editProduct(product)" tappable>
      <div class="product-card-header">
        <div class="product-info">
          <h3>{{ product.naziv }}</h3>
          <p class="product-meta">Šifra: {{ product.sifra }} <span *ngIf="product.barcode">| Barkod: {{ product.barcode }}</span></p>
          <p class="product-meta" *ngIf="product.cena">Cena: {{ product.cena | number:'1.2-2' }} RSD</p>
        </div>
        <div class="product-actions">
          <ion-button fill="clear" size="small" (click)="$event.stopPropagation(); editProduct(product)">
            <ion-icon slot="icon-only" name="create-outline" color="primary"></ion-icon>
          </ion-button>
          <ion-button fill="clear" size="small" (click)="$event.stopPropagation(); deleteProduct(product)">
            <ion-icon slot="icon-only" name="trash-outline" color="danger"></ion-icon>
          </ion-button>
        </div>
      </div>
      <div class="product-tags">
        <span class="tag" [class.acis]="product.source === 'ACIS'" [class.manual]="product.source === 'MANUAL'">
          {{ product.source }}
        </span>
      </div>
    </div>
  </ion-list>

  <ion-infinite-scroll (ionInfinite)="loadMore($event)">
    <ion-infinite-scroll-content></ion-infinite-scroll-content>
  </ion-infinite-scroll>

  <!-- Empty state -->
  <div class="empty-state" *ngIf="store.filteredProducts().length === 0 && !store.loading()">
    <ion-icon name="cube-outline"></ion-icon>
    <h3>Nema artikala</h3>
    <p *ngIf="searchText">Nema rezultata za "{{ searchText }}"</p>
    <p *ngIf="!searchText">Katalog je prazan</p>
    <ion-button (click)="addProduct()" class="pill-button" *ngIf="!searchText">
      <ion-icon slot="start" name="add-circle-outline"></ion-icon>
      Dodaj prvi artikal
    </ion-button>
  </div>
</ion-content>
