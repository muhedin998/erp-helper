<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Kupovina</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card color="light" class="ion-no-margin">
    <ion-card-content class="ion-text-center">
      <h2>{{ store.activeList()?.naziv }}</h2>
      <ion-progress-bar [value]="store.purchaseProgress() / 100" color="success"></ion-progress-bar>
      <p>
        {{ store.checkedCount() }} / {{ store.itemCount() }} &mdash; 
        <strong>{{ store.purchaseProgress() }}%</strong> završeno
      </p>
    </ion-card-content>
  </ion-card>

  <ion-list>
    <ion-item *ngFor="let item of store.items()" [class.checked]="item.checked">
      <ion-checkbox
        slot="start"
        [checked]="item.checked"
        (ionChange)="toggleItem(item)"
      ></ion-checkbox>
      <ion-label>
        <h2 [class.line-through]="item.checked">{{ item.naziv }}</h2>
        <p>
          <span [class.line-through]="item.checked">
            {{ item.quantity }} kom
          </span>
          <span *ngIf="item.checked && item.purchasedQuantity > 0">
            &mdash; Kupljeno: <strong>{{ item.purchasedQuantity }}</strong>
          </span>
          <span *ngIf="item.checked && item.purchasedQuantity === 0">
            &mdash; <em>bez kupovine</em>
          </span>
        </p>
      </ion-label>
      <ion-chip slot="end" color="primary" *ngIf="!item.checked">
        {{ item.quantity }}
      </ion-chip>
      <ion-icon slot="end" color="success" name="checkmark-circle" *ngIf="item.checked"></ion-icon>
    </ion-item>
  </ion-list>

  <div class="ion-text-center ion-padding" *ngIf="store.items().length === 0">
    <p>Lista je prazna.</p>
  </div>
</ion-content>

<ion-footer *ngIf="store.purchaseProgress() === 100">
  <ion-toolbar>
    <ion-button expand="block" (click)="finishPurchase()" size="large" color="success">
      Završi kupovinu
    </ion-button>
  </ion-toolbar>
</ion-footer>
