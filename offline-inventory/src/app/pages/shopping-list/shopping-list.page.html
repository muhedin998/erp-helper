<ion-header class="ion-no-border">
  <ion-toolbar class="page-header">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" icon="chevron-back"></ion-back-button>
    </ion-buttons>
    <ion-title>Liste za nabavku</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="createNewList()" size="small">
        <ion-icon slot="icon-only" name="add-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Empty state -->
  <div class="empty-state" *ngIf="store.allLists().length === 0">
    <ion-icon name="document-text-outline"></ion-icon>
    <h3>Nema listi</h3>
    <p>Kreirajte prvu listu za nabavku</p>
  </div>

  <!-- Lists -->
  <div class="list-items" *ngIf="store.allLists().length > 0">
    <div class="shopping-list-card" *ngFor="let list of store.allLists()" (click)="openList(list)" tappable>
      <div class="list-card-left">
        <div class="list-icon" [class.draft]="list.status === 'DRAFT'" [class.ready]="list.status === 'READY_FOR_PURCHASE'" [class.purchased]="list.status === 'PURCHASED'">
          <ion-icon [name]="list.status === 'PURCHASED' ? 'checkmark-outline' : 'cart-outline'"></ion-icon>
        </div>
      </div>
      <div class="list-card-center">
        <h3>{{ list.naziv }}</h3>
        <p>{{ list.createdAt | date:'dd.MM.yyyy. HH:mm' }}</p>
      </div>
      <div class="list-card-right">
        <div class="status-badge" [class.draft]="list.status === 'DRAFT'" [class.ready]="list.status === 'READY_FOR_PURCHASE'" [class.purchased]="list.status === 'PURCHASED'">
          {{ statusLabel(list.status) }}
        </div>
      </div>
    </div>
  </div>
</ion-content>
