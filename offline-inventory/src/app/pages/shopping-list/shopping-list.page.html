<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Liste za nabavku</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="createNewList()">
        <ion-icon slot="icon-only" name="add"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="ion-text-center ion-padding" *ngIf="store.allLists().length === 0">
    <p>Nema kreiranih listi.</p>
    <ion-button (click)="createNewList()">Kreiraj prvu listu</ion-button>
  </div>

  <ion-list>
    <ion-item-sliding *ngFor="let list of store.allLists()">
      <ion-item detail (click)="openList(list)">
        <ion-label>
          <h2>{{ list.naziv }}</h2>
          <p>{{ list.createdAt | date:'dd.MM.yyyy. HH:mm' }}</p>
          <ion-badge [color]="statusColor(list.status)">
            {{ statusLabel(list.status) }}
          </ion-badge>
        </ion-label>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option (click)="cloneList(list)">
          <ion-icon slot="icon-only" name="copy"></ion-icon>
        </ion-item-option>
        <ion-item-option color="danger" (click)="deleteList(list)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>
</ion-content>
