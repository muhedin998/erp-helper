<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Istorija</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="ion-text-center ion-padding" *ngIf="store.history().length === 0">
    <p>Nema istorije listi.</p>
  </div>

  <ng-container *ngFor="let group of store.history()">
    <ion-item-divider color="light">
      <ion-label>
        <strong>{{ group.date | date:'dd.MM.yyyy.' }}</strong>
      </ion-label>
    </ion-item-divider>

    <ion-list>
      <ion-item *ngFor="let list of group.lists" detail (click)="openList(list)">
        <ion-label>
          <h3>{{ list.naziv }}</h3>
          <p>{{ list.createdAt | date:'HH:mm' }}</p>
        </ion-label>
        <ion-badge slot="end" [color]="statusColor(list.status)">
          {{ statusLabel(list.status) }}
        </ion-badge>
      </ion-item>
    </ion-list>
  </ng-container>
</ion-content>
